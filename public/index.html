<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exemplar Sales Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-5xl mx-auto p-6">
    <header class="mb-6">
      <h1 class="text-2xl font-bold">Exemplar Sales Agent</h1>
      <p class="text-slate-600">Research en prospect-virksomhed og få konkrete grunde til at ringe.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="md:col-span-2 space-y-6">
        <form id="research-form" class="bg-white rounded-lg shadow p-4 space-y-3">
          <div>
            <label class="block text-sm font-medium mb-1">Firmanavn *</label>
            <input id="companyName" required class="w-full border rounded px-3 py-2" placeholder="Fx Kims A/S" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Website</label>
            <input id="website" class="w-full border rounded px-3 py-2" placeholder="https://..." />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Noter (valgfrit)</label>
            <textarea id="notes" class="w-full border rounded px-3 py-2" rows="2" placeholder="Fx: kender indkøbschef, tidligere kunde af konkurrent X"></textarea>
          </div>

          <details class="border rounded px-3 py-2">
            <summary class="text-sm font-medium cursor-pointer select-none">Avancerede indstillinger</summary>
            <div class="mt-3 space-y-3">
              <div>
                <label class="block text-sm font-medium mb-1">Udbyder</label>
                <select id="provider" class="w-full border rounded px-3 py-2">
                  <option value="anthropic">Claude (Anthropic)</option>
                  <option value="gemini">Gemini (Google, gratis tier - til test)</option>
                </select>
                <p id="provider-hint" class="text-xs text-slate-500 mt-1"></p>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1">Model</label>
                <select id="model" class="w-full border rounded px-3 py-2">
                  <option value="">Standard (fra server-config)</option>
                </select>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-medium mb-1">Max tokens (research)</label>
                  <input id="researchMaxTokens" type="number" min="1024" max="64000" step="1000" class="w-full border rounded px-3 py-2" placeholder="24000" />
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">Max tokens (brief)</label>
                  <input id="briefMaxTokens" type="number" min="1024" max="64000" step="1000" class="w-full border rounded px-3 py-2" placeholder="8000" />
                </div>
              </div>
              <p class="text-xs text-slate-500">Lavere max tokens (research) = billigere/hurtigere, men øger risikoen for at et langt svar bliver skåret af.</p>
            </div>
          </details>

          <button type="submit" id="submit-btn" class="bg-slate-900 text-white rounded px-4 py-2 font-medium">
            Research virksomhed
          </button>
          <p id="status" class="text-sm text-slate-500"></p>
        </form>

        <div id="result" class="bg-white rounded-lg shadow p-4 hidden"></div>
      </div>

      <div>
        <h2 class="font-semibold mb-2">Tidligere researchede</h2>
        <ul id="history" class="space-y-2"></ul>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
